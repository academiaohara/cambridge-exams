<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D2E5F"/>
      <stop offset="100%" stop-color="#1E9D8E"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="11" ry="11" fill="url(#bg)"/>
  <!-- Mountain / peak (main shape) -->
  <polygon points="20,7 34,31 6,31" fill="white" opacity="0.95"/>
  <!-- Snow-cap highlight -->
  <polygon points="20,7 24.5,16.5 15.5,16.5" fill="#1E9D8E" opacity="0.38"/>
  <!-- Ground baseline -->
  <rect x="5" y="32.5" width="30" height="2" rx="1" fill="white" opacity="0.4"/>
</svg>
