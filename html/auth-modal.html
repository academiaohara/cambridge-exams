<!-- html/auth-modal.html -->
<!-- Reference snippet — the actual markup is inlined in index.html -->
<div id="auth-screen" class="auth-screen" style="display:none;" aria-modal="true" role="dialog" aria-labelledby="auth-title">
  <header class="auth-screen-header">
    <button type="button" id="auth-close-btn" class="auth-screen-close" onclick="Auth.closeAuthScreen()" aria-label="Close" style="visibility:hidden;">
      <span class="material-symbols-outlined" aria-hidden="true">close</span>
    </button>
    <button type="button" id="auth-guest-header-btn" class="auth-screen-header-link" onclick="Auth.continueAsGuest()">Continue as guest</button>
  </header>
  <main class="auth-screen-main">
    <h1 id="auth-title" class="auth-screen-title">Log in</h1>
    <div class="auth-screen-form">
      <button id="auth-google-btn" class="auth-screen-google-btn" onclick="Auth.signInWithGoogle()" type="button">
        <svg class="auth-google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        <span>GOOGLE</span>
      </button>
      <div id="auth-loader" class="auth-screen-loader">
        <i class="fas fa-circle-notch" aria-hidden="true"></i>
        <span>Redirecting to Google…</span>
      </div>
      <div id="auth-error-msg" class="auth-screen-error" role="alert"></div>
      <div class="auth-divider"><span>OR</span></div>
      <button id="auth-guest-btn" class="auth-screen-guest-btn" onclick="Auth.continueAsGuest()" type="button">
        Continue without signing in
      </button>
      <p class="auth-guest-note">Free access to the first exam (writing &amp; speaking locked)</p>
    </div>
  </main>
  <footer class="auth-screen-footer">
    <p>By signing in to Sune English, you agree to our Terms and Privacy Policy.</p>
  </footer>
</div>
