<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela — Porra del Avilés</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/quiniela.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#/" class="brand">
        <span class="brand-badge">QA</span>
        <span class="brand-text">Quiniela Avilés</span>
      </a>
      <nav class="main-nav" id="main-nav">
        <a href="#/" data-route="home" class="nav-link active">Quiniela</a>
        <a href="#/porra" data-route="porra" class="nav-link">Porra del Avilés</a>
        <a href="#/jornada" data-route="jornada" class="nav-link">Resultado jornada</a>
        <a href="#/ranking" data-route="ranking" class="nav-link">Resultados y ranking</a>
      </nav>
    </div>
  </header>

  <main id="app" class="app-main"></main>

  <div id="match-preview-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel modal-panel--wide">
      <header class="modal-header">
        <h2 id="preview-modal-title">Previa del partido</h2>
        <button type="button" class="modal-close" data-close-modal aria-label="Cerrar">&times;</button>
      </header>
      <div id="preview-modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
